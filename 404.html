<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KeyGlobal</title>
  <script>
    // Redirect all 404s to index.html with the path preserved
    sessionStorage.redirect = location.href;
  </script>
  <meta http-equiv="refresh" content="0;URL='/KeyGlobal/'">
</head>
<body>
  <script>
    // Fallback redirect
    if (sessionStorage.redirect) {
      location.href = '/KeyGlobal/';
    }
  </script>
</body>
</html>
